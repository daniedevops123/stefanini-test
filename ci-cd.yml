name: CI/CD Pipeline — JSON Server API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: stefanini-json-api
  RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

jobs:
  # ─────────────────────────────────────────
  # STAGE 1: Validate
  # ─────────────────────────────────────────
  validate:
    name: Validate JSON & Dockerfile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate db.json is valid JSON
        run: |
          echo "Validating data/db.json..."
          python3 -c "import json; json.load(open('data/db.json')); print('JSON is valid')"

      - name: Verify required resources exist
        run: |
          echo "Checking required files..."
          test -f Dockerfile       && echo "Dockerfile found" || (echo "ERROR: Dockerfile missing" && exit 1)
          test -f data/db.json     && echo "db.json found"    || (echo "ERROR: db.json missing"    && exit 1)
          test -f docker-compose.yml && echo "docker-compose.yml found" || (echo "ERROR: docker-compose.yml missing" && exit 1)

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3018,DL3016

  # ─────────────────────────────────────────
  # STAGE 2: Build & Test (Docker)
  # ─────────────────────────────────────────
  build-and-test:
    name: Build Docker Image & Smoke Test
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .
          docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:latest

      - name: Run container and smoke test
        run: |
          echo "Starting container..."
          docker run -d --name test-api -p 3000:3000 $IMAGE_NAME:latest

          echo "Waiting for service to be healthy..."
          timeout 30 bash -c 'until curl -sf http://localhost:3000/products; do sleep 2; done'

          echo "Running endpoint tests..."
          curl -sf http://localhost:3000/products | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert isinstance(data, list), 'Expected list'
          assert len(data) > 0, 'Expected non-empty products list'
          print(f'Products endpoint OK — {len(data)} records found')
          "

          curl -sf http://localhost:3000/users | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert len(data) > 0, 'Expected non-empty users list'
          print(f'Users endpoint OK — {len(data)} records found')
          "

          curl -sf http://localhost:3000/orders | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert len(data) > 0, 'Expected non-empty orders list'
          print(f'Orders endpoint OK — {len(data)} records found')
          "

      - name: Print container logs on failure
        if: failure()
        run: docker logs test-api

      - name: Cleanup test container
        if: always()
        run: docker rm -f test-api || true

  # ─────────────────────────────────────────
  # STAGE 3: Push to Docker Hub
  # ─────────────────────────────────────────
  push-image:
    name: Push Image to Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # STAGE 4: Deploy to Render
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: push-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          echo "Triggering deployment to Render..."
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -d '{"clearCache": false}'

      - name: Wait for deployment to go live
        run: |
          echo "Waiting 60 seconds for service to boot..."
          sleep 60

      - name: Verify deployment is healthy
        run: |
          SERVICE_URL="${{ secrets.RENDER_SERVICE_URL }}"
          echo "Checking $SERVICE_URL/products ..."
          curl -sf "$SERVICE_URL/products" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(f'Deployment verified — {len(data)} products reachable')
          "

      - name: Deployment summary
        run: |
          echo "Deployment complete!"
          echo "Service URL: ${{ secrets.RENDER_SERVICE_URL }}"
          echo "Commit SHA:  ${{ github.sha }}"
